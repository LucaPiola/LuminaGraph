<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STGraphX Player Demo</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
        background:
          linear-gradient(180deg, #eef4fa 0%, #f8fbfd 100%);
        color: #24384d;
      }
      main {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }
      h1 {
        margin: 0;
        font-size: 1.8rem;
      }
      p {
        margin: 0;
        color: #5a6f84;
      }
    </style>
    <script src="player-runtime-loader.js"></script>
  </head>
  <body>
    <main>
      <div>
        <h1>STGraphX Embedded Player</h1>
        <p>First standalone shell powered by the shared runtime modules.</p>
      </div>
      <stgraphx-player src="examples/newtonian_system.json" lang="it" zoom="0.5" controls="full" show-graph="false"></stgraphx-player>
      <stgraphx-player src="examples/life.json" lang="en" zoom="0.5" controls="full"></stgraphx-player>
    </main>
    <script>
      document.querySelectorAll("stgraphx-player").forEach((player, index) => {
        player.addEventListener("stgraphx-load", (event) => {
          console.log("player loaded", index, event.detail);
        });
        player.addEventListener("stgraphx-run-start", (event) => {
          console.log("player run start", index, event.detail);
        });
        player.addEventListener("stgraphx-run-stop", (event) => {
          console.log("player run stop", index, event.detail);
        });
        player.addEventListener("stgraphx-error", (event) => {
          console.error("player error", index, event.detail);
        });
      });
    </script>
  </body>
</html>
